server {
  listen 80;
  listen [::]:80;
  server_name _;

  ## Root apunta al directorio donde copiamos dist/.
  root /usr/share/nginx/html;
  index index.html;

  ## En Kubernetes el frontend usa VITE_API_URL=/api y nginx
  ## resuelve el Service interno del backend por DNS.
  location /api/ {
    proxy_pass http://backend:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  ## Las rutas del frontend usan BrowserRouter, asi que un refresh
  ## en /catalogo o /producto/123 debe devolver index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }

  ## Los assets generados por Vite suelen llevar hash en el nombre.
  ## Les damos cache largo para mejorar rendimiento.
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
